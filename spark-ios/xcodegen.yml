# Spark - Native iOS App
# Generated with XcodeGen 2.45+

name: Spark
options:
  bundleIdPrefix: com.arhaventures
  deploymentTarget:
    iOS: "17.0"
  minimumXcodeGenVersion: "2.40.0"
  generateEmptyDirectories: true
  useBaseInternationalization: true
  defaultConfig: Release
  groupSortPosition: bottom
  indentWidth: 4
  tabWidth: 4

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_STRICT_CONCURRENCY: YES
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""   # Set this in Xcode or via local config
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  Spark:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Spark/Sources
    resources:
      - path: Spark/Resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arhaventures.spark
        PRODUCT_NAME: Spark
        INFOPLIST_FILE: Spark/Resources/Info.plist
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          PRODUCT_NAME: Spark
    scheme:
      testTargets:
        - SparkTests
        - SparkUITests
    dependencies: []

  SparkTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SparkTests
    dependencies:
      - target: Spark
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Spark.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Spark"
        BUNDLE_LOADER: "$(TEST_HOST)"

  SparkUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SparkUITests
    dependencies:
      - target: Spark
    settings:
      base:
        TEST_TARGET_NAME: Spark

packages: {}
