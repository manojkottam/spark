name = "spark-backend"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# D1 Database (for child profiles, progress, AI memory / Echoes)
[[d1_databases]]
binding = "DB"
database_name = "spark-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"   # Set this after creating the D1 database

